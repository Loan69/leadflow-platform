<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow — Pige</title>

    <!--
      ══════════════════════════════════════════════════════════════
      DASHBOARD PIGE AUTOMATISÉE — LeadFlow
      ══════════════════════════════════════════════════════════════
      Rôle    : afficher les biens scrapés depuis PAP/LBC par n8n,
                avec leur analyse IA (score, points forts, mail).

      Stack   : HTML/CSS/JS vanilla — zéro dépendance externe JS
      Fonts   : Google Fonts (Cormorant Garamond, Figtree, DM Mono)
      Serveur : server.js Express sur Railway (voir variable BASE)

      Flux de données :
        n8n scrape PAP/LBC → analyse Claude
          → POST /api/pige/bien (server.js)
          → ce dashboard poll GET /api/pige/biens toutes les 30s
          → affiche les biens dans la sidebar + détail au clic

      Pour changer l'URL du serveur → chercher BASE dans le JS
      ══════════════════════════════════════════════════════════════
    -->

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Figtree:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
      /* ══════════════════════════════════════════
        RESET & VARIABLES CSS
        Palette crème/or cohérente avec LeadFlow
        ══════════════════════════════════════════ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --cream:   #f7f4ee;   /* fond général */
        --cream2:  #f0ebe0;   /* fond légèrement plus foncé */
        --cream3:  #e8e0d0;   /* fond encore plus foncé */
        --white:   #ffffff;
        --ink:     #1c1a16;   /* texte principal */
        --ink3:    #4a4640;   /* texte secondaire */
        --muted:   #8a8478;   /* texte atténué */
        --pale:    #b8b0a0;   /* texte très atténué */
        --gold:    #b8893a;   /* or principal */
        --gold2:   #d4a853;   /* or clair */
        --green:   #2a8a60;   /* potentiel fort */
        --red:     #c84040;   /* potentiel faible */
        --orange:  #c87020;   /* potentiel moyen */
        --border:  #e0d8c8;
        --border2: #d0c8b8;
      }

      /* L'app occupe toute la fenêtre sans scroll global */
      html, body { height: 100%; overflow: hidden; }
      body {
        font-family: 'Figtree', sans-serif;
        background: var(--cream);
        color: var(--ink);
        font-size: 13px;
        line-height: 1.6;
        display: flex;
        flex-direction: column;
      }

      /* ══════════════════════════════════════════
        HEADER
        - Logo LeadFlow
        - Badge date (mis à jour par JS)
        - Bouton PDF (grisé si aucun bien sélectionné)
        ══════════════════════════════════════════ */
      header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 0 28px; height: 54px;
        background: rgba(247,244,238,.97);
        backdrop-filter: blur(20px);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0; z-index: 50;
      }
      .logo { display: flex; align-items: center; gap: 11px; }
      .logo-mark {
        width: 30px; height: 30px;
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        border-radius: 7px;
        display: flex; align-items: center; justify-content: center;
        font-size: 14px;
      }
      .logo-name { font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400; }
      .logo-name em { font-style: italic; color: var(--gold); }
      .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 1px; }
      .header-right { display: flex; align-items: center; gap: 10px; }

      /* Badge affichant la date du dernier scraping */
      .date-badge {
        font-size: 11px; color: var(--muted);
        font-family: 'DM Mono', monospace;
        padding: 3px 10px;
        background: var(--cream2); border: 1px solid var(--border); border-radius: 6px;
      }

      /* Bouton PDF — grisé par défaut (disabled)
        Activé dès qu'un bien est sélectionné via sel() */
      .btn-pdf {
        display: flex; align-items: center; gap: 6px;
        background: var(--cream3); color: var(--pale);
        border: 1px solid var(--border);
        padding: 7px 16px; border-radius: 8px;
        font-family: 'Figtree', sans-serif; font-size: 12px; font-weight: 500;
        cursor: not-allowed; transition: all .2s; opacity: .55;
      }
      .btn-pdf:not([disabled]) {
        background: linear-gradient(135deg, var(--gold), var(--gold2));
        color: white; border: none; cursor: pointer; opacity: 1;
      }
      .btn-pdf:not([disabled]):hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(184,137,58,.3); }

      /* ══════════════════════════════════════════
        BARRE DE STATISTIQUES
        4 compteurs mis à jour par updateStats()
        ══════════════════════════════════════════ */
      .stats-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--white); flex-shrink: 0; }
      .stat-item { flex: 1; padding: 10px 20px; display: flex; align-items: center; gap: 12px; border-right: 1px solid var(--border); }
      .stat-item:last-child { border-right: none; }
      .stat-val { font-family: 'Cormorant Garamond', serif; font-size: 22px; font-weight: 600; color: var(--ink); line-height: 1; }
      .stat-label { font-size: 10px; color: var(--muted); margin-top: 2px; }

      /* ══════════════════════════════════════════
        LAYOUT PRINCIPAL
        Sidebar 290px fixe + panneau de détail flexible
        ══════════════════════════════════════════ */
      .app-body { display: flex; flex: 1; overflow: hidden; }

      /* ── SIDEBAR ──────────────────────────────── */
      .sidebar {
        width: 290px; flex-shrink: 0;
        border-right: 1px solid var(--border);
        display: flex; flex-direction: column;
        background: var(--white);
      }

      /* Champ de recherche texte — filtre en temps réel */
      .sidebar-search { padding: 12px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
      .search-wrap { position: relative; }
      .search-input {
        width: 100%; background: var(--cream);
        border: 1px solid var(--border2); border-radius: 8px;
        padding: 7px 10px 7px 30px;
        font-family: 'Figtree', sans-serif; font-size: 12px; color: var(--ink);
        outline: none; transition: border-color .2s;
      }
      .search-input:focus { border-color: var(--gold); background: white; }
      .search-input::placeholder { color: var(--pale); }
      .search-ico { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--pale); font-size: 12px; pointer-events: none; }

      /* Pills de filtre par potentiel — gérées par setPot() */
      .pot-pills { display: flex; gap: 4px; padding: 8px 14px 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
      .ppill {
        flex: 1; padding: 4px 0; text-align: center;
        background: var(--cream2); border: 1px solid var(--border); border-radius: 6px;
        font-size: 11px; font-weight: 500; color: var(--muted);
        cursor: pointer; transition: all .15s; font-family: 'Figtree', sans-serif;
      }
      .ppill.active { background: rgba(184,137,58,.08); border-color: rgba(184,137,58,.3); color: var(--gold); }

      /* Compteur de biens visibles */
      .sidebar-count { display: flex; align-items: center; justify-content: space-between; padding: 5px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
      .count-txt { font-size: 10px; color: var(--pale); }
      .count-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); font-weight: 500; }

      /* Liste scrollable des cartes biens
        overflow-y: auto = scroll natif quand ça dépasse
        on ne ratatine pas les cartes, on scrolle */
      .bien-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 7px; }
      .bien-list::-webkit-scrollbar { width: 3px; }
      .bien-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

      /* ── BIEN CARD — carte dans la sidebar ─────
        Générée par renderList() · Clic → sel(id)
        Padding généreux pour que les cartes respirent
        La barre gauche dorée apparaît sur .active */
      .bcard {
        background: var(--cream); border: 1px solid var(--border);
        border-radius: 11px; padding: 13px 14px;
        cursor: pointer; transition: all .18s;
        position: relative; overflow: hidden;
        flex-shrink: 0; /* ne rétrécit jamais — on scrolle à la place */
      }
      .bcard::before {
        content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
        border-radius: 11px 0 0 11px; opacity: 0; transition: opacity .2s;
      }
      .bcard:hover { background: white; border-color: var(--border2); }
      .bcard.active { background: white; border-color: var(--gold); }
      .bcard.active::before { background: var(--gold); opacity: 1; }

      .bcard-row1 { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 5px; }
      /* Le titre peut passer sur 2 lignes si l'adresse est longue */
      .bcard-title { font-size: 12.5px; font-weight: 500; color: var(--ink); line-height: 1.4; }
      .bcard-addr  { font-size: 11px; color: var(--muted); margin-top: 3px; line-height: 1.35; }

      /* Point coloré indiquant le potentiel (vert/orange/rouge) */
      .pot-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
      .pd-fort   { background: var(--green); }
      .pd-moyen  { background: var(--orange); }
      .pd-faible { background: var(--red); }

      /* Séparateur fin entre titre et métriques */
      .bcard-divider { height: 1px; background: var(--border); margin: 8px 0; }

      .bcard-row2 { display: flex; align-items: center; justify-content: space-between; }
      .bcard-prix { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600; color: var(--gold); }
      /* Meta sur 2 éléments séparés pour plus d'air */
      .bcard-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
      .bcard-meta-top { font-size: 10px; color: var(--pale); }
      .bcard-meta-statut { font-size: 10px; font-weight: 500; }

      /* ── PANNEAU DE DÉTAIL ─────────────────────
        Affiche soit l'état vide soit le détail
        Le contenu est injecté dynamiquement par sel()
        ══════════════════════════════════════════ */
      .detail-pane { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--cream); }

      /* État vide — affiché quand aucun bien n'est sélectionné */
      .detail-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; }
      .detail-empty-icon { font-size: 36px; opacity: .18; }
      .detail-empty-txt  { font-size: 12px; color: var(--pale); }

      /* Conteneur scrollable du détail */
      .detail-scroll { flex: 1; overflow-y: auto; padding: 22px 26px; display: flex; flex-direction: column; gap: 18px; }
      .detail-scroll::-webkit-scrollbar { width: 3px; }
      .detail-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

      /* ── Carte principale du bien ── */
      .dh-wrap { background: var(--white); border: 1px solid var(--border); border-radius: 13px; padding: 18px 22px; }
      .dh-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
      .dh-source { font-size: 9px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
      .dh-title  { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 400; color: var(--ink); margin-bottom: 2px; }
      .dh-addr   { font-size: 12px; color: var(--muted); }
      .dh-prix   { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 600; color: var(--gold); line-height: 1; text-align: right; }
      .dh-m2     { font-size: 11px; color: var(--muted); text-align: right; margin-top: 2px; }
      .dh-tags   { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
      .dh-tag    { padding: 3px 9px; border-radius: 5px; font-size: 11px; background: var(--cream2); border: 1px solid var(--border); color: var(--ink3); }
      .dh-actions { display: flex; gap: 6px; }
      .btn-sm   { padding: 6px 13px; border-radius: 7px; font-family: 'Figtree', sans-serif; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .18s; border: none; }
      .btn-send { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: white; }
      .btn-send:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(184,137,58,.3); }
      .btn-ok   { background: rgba(42,138,96,.08); color: var(--green); border: 1px solid rgba(42,138,96,.2) !important; }
      .btn-skip { background: var(--cream2); color: var(--muted); border: 1px solid var(--border) !important; }

      /* Titre de section avec ligne décorative auto-extensible */
      .section-title { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
      .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

      /* ── Points forts du bien ── */
      .points-grid { display: flex; flex-direction: column; gap: 6px; }
      .point-card { display: flex; gap: 10px; align-items: flex-start; padding: 10px 13px; background: var(--white); border: 1px solid var(--border); border-radius: 9px; }
      .point-ico  { width: 26px; height: 26px; border-radius: 6px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; }
      /* Couleurs des icones selon le type de point */
      .pic-g { background: rgba(42,138,96,.08);  border: 1px solid rgba(42,138,96,.2); }
      .pic-o { background: rgba(184,137,58,.08); border: 1px solid rgba(184,137,58,.2); }
      .pic-b { background: rgba(58,112,200,.06); border: 1px solid rgba(58,112,200,.18); }
      .pic-r { background: rgba(200,112,32,.06); border: 1px solid rgba(200,112,32,.18); }
      .point-label { font-size: 12px; font-weight: 500; color: var(--ink); margin-bottom: 1px; }
      .point-desc  { font-size: 11px; color: var(--ink3); line-height: 1.5; font-weight: 300; }

      /* Grille 2 colonnes pour Potentiel + Stratégie */
      .two-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

      /* ── Carte potentiel ── */
      .pot-card  { background: var(--white); border: 1px solid var(--border); border-radius: 10px; padding: 15px; }
      .pot-lbl   { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 7px; }
      .pot-score { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 600; line-height: 1; margin-bottom: 7px; }
      .ps-f { color: var(--green); }
      .ps-m { color: var(--orange); }
      .ps-w { color: var(--red); }
      /* Barre de progression — largeur définie inline via style="width:${score}%" */
      .pot-bar-wrap { height: 5px; background: var(--cream3); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
      .pot-bar { height: 100%; border-radius: 3px; }
      .pb-f { background: linear-gradient(90deg, var(--green), #40aa80); }
      .pb-m { background: linear-gradient(90deg, var(--orange), #e09040); }
      .pb-w { background: linear-gradient(90deg, var(--red), #e06060); }
      .pot-desc { font-size: 11px; color: var(--ink3); line-height: 1.55; font-weight: 300; }

      /* ── Carte stratégie d'approche (fond sombre) ── */
      .approche-card { background: var(--ink); border-radius: 10px; padding: 15px; position: relative; overflow: hidden; }
      /* Cercle décoratif lumineux */
      .approche-card::before { content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px; border-radius: 50%; background: radial-gradient(circle, rgba(184,137,58,.12) 0%, transparent 70%); }
      .approche-lbl { font-size: 9px; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 7px; font-weight: 600; }
      .approche-txt { font-size: 11.5px; color: rgba(247,244,238,.75); line-height: 1.7; font-weight: 300; position: relative; z-index: 1; }

      /* ── Mail d'approche ── */
      .mail-wrap  { background: var(--white); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
      .mail-head  { display: flex; align-items: center; justify-content: space-between; padding: 11px 14px; border-bottom: 1px solid var(--border); background: var(--cream2); }
      .mail-objet { font-size: 12px; font-weight: 500; color: var(--ink); }
      /* Bouton copier → navigator.clipboard dans copier() */
      .mail-copy  { font-size: 10px; color: var(--gold); cursor: pointer; background: none; border: none; font-family: 'Figtree', sans-serif; font-weight: 600; transition: opacity .2s; }
      .mail-copy:hover { opacity: .6; }
      /* white-space: pre-line préserve les sauts de ligne du texte brut */
      .mail-body  { padding: 13px 15px; font-size: 11.5px; color: var(--ink3); line-height: 1.8; font-weight: 300; white-space: pre-line; }

      /* ── Badges potentiel (inline dans les tags) ── */
      .pt-f { background: rgba(42,138,96,.08);  color: var(--green);  border: 1px solid rgba(42,138,96,.2);  padding: 3px 9px; border-radius: 5px; font-size: 10.5px; font-weight: 600; }
      .pt-m { background: rgba(200,112,32,.06); color: var(--orange); border: 1px solid rgba(200,112,32,.2); padding: 3px 9px; border-radius: 5px; font-size: 10.5px; font-weight: 600; }
      .pt-w { background: rgba(200,64,64,.06);  color: var(--red);    border: 1px solid rgba(200,64,64,.2);  padding: 3px 9px; border-radius: 5px; font-size: 10.5px; font-weight: 600; }

      /* ── Toasts — notifications temporaires ──
        Apparaissent en bas à droite, disparaissent après 3s */
      .toast-wrap { position: fixed; bottom: 18px; right: 18px; z-index: 400; display: flex; flex-direction: column; gap: 6px; }
      .toast { background: var(--ink); border-radius: 10px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; min-width: 220px; box-shadow: 0 8px 28px rgba(28,26,22,.22); animation: toastIn .25s ease; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
      .toast-t { font-size: 12px; font-weight: 500; color: #f7f4ee; }
      .toast-d { font-size: 10.5px; color: rgba(247,244,238,.5); margin-top: 1px; }
    </style>
  </head>
  <body>

    <!-- ══════════════════════════════════════════
        HEADER
        ══════════════════════════════════════════ -->
    <header>
      <div class="logo">
        <div class="logo-mark">🔍</div>
        <div>
          <div class="logo-name">Lead<em>Flow</em></div>
          <div class="logo-sub">Pige automatisée</div>
        </div>
      </div>
      <div class="header-right">
        <!-- Date du dernier scraping — remplie par init() -->
        <span class="date-badge" id="date-badge">—</span>
        <!-- Désactivé tant qu'aucun bien n'est sélectionné -->
        <button class="btn-pdf" id="btn-pdf" onclick="exportPDF()" disabled>🖨 Fiche PDF</button>
      </div>
    </header>

    <!-- ══════════════════════════════════════════
        BARRE DE STATISTIQUES
        Valeurs initialisées à 0, mises à jour par updateStats()
        ══════════════════════════════════════════ -->
    <div class="stats-bar">
      <div class="stat-item"><div><div class="stat-val" id="s-total">0</div><div class="stat-label">Biens analysés</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-fort" style="color:var(--green)">0</div><div class="stat-label">Fort potentiel</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-new">0</div><div class="stat-label">Nouveaux</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-sent" style="color:#3a70c8">0</div><div class="stat-label">Mails envoyés</div></div></div>
    </div>

    <!-- ══════════════════════════════════════════
        CORPS DE L'APPLICATION
        Sidebar gauche + panneau de détail droit
        ══════════════════════════════════════════ -->
    <div class="app-body">

      <!-- ── SIDEBAR ─────────────────────────── -->
      <div class="sidebar">

        <!-- Recherche texte — oninput déclenche renderList() -->
        <div class="sidebar-search">
          <div class="search-wrap">
            <span class="search-ico">🔍</span>
            <input class="search-input" id="search-input" placeholder="Rechercher…" oninput="renderList()">
          </div>
        </div>

        <!-- Filtres potentiel — gérés par setPot() -->
        <div class="pot-pills">
          <button class="ppill active" onclick="setPot(this,'all')">Tous</button>
          <button class="ppill" onclick="setPot(this,'fort')">⬤ Fort</button>
          <button class="ppill" onclick="setPot(this,'moyen')">⬤ Moyen</button>
          <button class="ppill" onclick="setPot(this,'faible')">⬤ Faible</button>
        </div>

        <!-- Compteur mis à jour par renderList() -->
        <div class="sidebar-count">
          <span class="count-txt">Biens affichés</span>
          <span class="count-num" id="bien-count">0</span>
        </div>

        <!-- Liste des cartes — injectée par renderList() -->
        <div class="bien-list" id="bien-list"></div>
      </div>

      <!-- ── PANNEAU DE DÉTAIL ──────────────── -->
      <div class="detail-pane">

        <!-- État vide — visible tant qu'aucun bien n'est sélectionné -->
        <div class="detail-empty" id="detail-empty">
          <div class="detail-empty-icon">🏠</div>
          <div class="detail-empty-txt">Sélectionnez un bien pour voir l'analyse</div>
        </div>

        <!-- Détail — masqué par défaut, affiché et rempli par sel() -->
        <div class="detail-scroll" id="detail-scroll" style="display:none;"></div>
      </div>

    </div>

    <!-- Zone des toasts (notifications) -->
    <div class="toast-wrap" id="toasts"></div>


    <script>
      // ══════════════════════════════════════════════════════════════
      // CONFIGURATION
      // ══════════════════════════════════════════════════════════════

      // URL de base du serveur Railway
      // ⚠️ Toujours avec https:// — sans slash final
      const BASE = 'https://leadflow-platform-production.up.railway.app';

      // Tableau des biens chargés depuis le serveur
      let BIENS = [];

      // ID du bien actuellement affiché dans le panneau de détail
      let selectedId = null;

      // Filtre actif sur le potentiel : 'all' | 'fort' | 'moyen' | 'faible'
      let potFilter = 'all';


      // ══════════════════════════════════════════════════════════════
      // INITIALISATION
      // 1. Met à jour la date dans le header
      // 2. Charge les biens depuis le serveur
      // 3. Lance un poll toutes les 5 secondes pour détecter
      //    les nouveaux biens insérés par n8n — sans refresh
      // ══════════════════════════════════════════════════════════════
      async function init() {
        const now = new Date();
        document.getElementById('date-badge').textContent =
          'Scraping du ' + now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' }) + ' à 08h00';

        // ── Chargement initial ────────────────────────────────────
        await chargerBiens();

        // ── Poll toutes les 5 secondes ───────────────────────────
        // Compare le nombre de biens — si ça change, on rafraîchit
        setInterval(async () => {
          try {
            const res = await fetch(`${BASE}/api/pige/biens`);
            const nouveaux = await res.json();
            if (nouveaux.length !== BIENS.length) {
              const diff = nouveaux.length - BIENS.length;
              console.log(`[PIGE][POLL] ${diff > 0 ? '+' + diff + ' nouveau(x)' : 'changement'} → rafraîchissement`);
              BIENS = nouveaux;
              updateStats();
              renderList();
              if (diff > 0) {
                toast('🆕', `${diff} nouveau${diff > 1 ? 'x' : ''} bien${diff > 1 ? 's' : ''}`, 'Mis à jour automatiquement');
              }
            }
          } catch(e) {
            console.warn('[PIGE][POLL] Serveur non disponible — prochaine tentative dans 5s');
          }
        }, 5000);
      }

      // Chargement initial des biens depuis le serveur
      async function chargerBiens() {
        try {
          console.log('[PIGE] Chargement des biens...');
          const res = await fetch(`${BASE}/api/pige/biens`);
          BIENS = await res.json();
          updateStats();
          renderList();
          console.log(`[PIGE] ✅ ${BIENS.length} biens chargés`);
          if (BIENS.length > 0) {
            toast('🔍', 'Pige chargée', `${BIENS.length} biens analysés`);
          }
        } catch(e) {
          console.error('[PIGE] ❌ Chargement échoué :', e);
          toast('⚠️', 'Serveur non disponible', 'Vérifiez que le serveur Railway tourne');
        }
      }

      // ══════════════════════════════════════════════════════════════
      // MISE À JOUR DES STATISTIQUES
      // Recompte les biens et met à jour les 4 compteurs en haut
      // ══════════════════════════════════════════════════════════════
      function updateStats() {
        document.getElementById('s-total').textContent = BIENS.length;
        document.getElementById('s-fort').textContent  = BIENS.filter(b => b.potentiel === 'fort').length;
        document.getElementById('s-new').textContent   = BIENS.filter(b => b.statut === 'new').length;
        document.getElementById('s-sent').textContent  = BIENS.filter(b => b.statut === 'sent').length;
      }


      // ══════════════════════════════════════════════════════════════
      // FILTRE PAR POTENTIEL
      // Appelé par les boutons pills — met à jour potFilter et re-render
      // ══════════════════════════════════════════════════════════════
      function setPot(el, val) {
        potFilter = val;
        document.querySelectorAll('.ppill').forEach(p => p.classList.remove('active'));
        el.classList.add('active');
        renderList();
      }


      // ══════════════════════════════════════════════════════════════
      // RENDU DE LA LISTE
      // Filtre BIENS selon potFilter + recherche texte
      // Génère les cartes HTML et les injecte dans #bien-list
      // ══════════════════════════════════════════════════════════════
      function renderList() {
        const q = document.getElementById('search-input').value.toLowerCase();

        const filtered = BIENS.filter(b =>
          (potFilter === 'all' || b.potentiel === potFilter) &&
          (!q || b.titre.toLowerCase().includes(q) || b.adresse.toLowerCase().includes(q))
        );

        document.getElementById('bien-count').textContent = filtered.length;

        // Correspondances statut → couleur et label pour la meta ligne
        const stColor = { new: 'var(--green)', sent: '#3a70c8', contact: 'var(--gold)', ignore: 'var(--pale)' };
        const stLabel = { new: 'Nouveau', sent: 'Envoyé', contact: 'Contacté', ignore: 'Ignoré' };
        const potDot  = { fort: 'pd-fort', moyen: 'pd-moyen', faible: 'pd-faible' };

        document.getElementById('bien-list').innerHTML = filtered.map(b => `
          <div class="bcard ${String(selectedId) === String(b.id) ? 'active' : ''}" onclick="sel('${b.id}')">
            <div class="bcard-row1">
              <div style="flex:1;min-width:0;">
                <div class="bcard-title">${b.emoji || '🏠'} ${b.titre || b.adresse}</div>
                <div class="bcard-addr">📍 ${b.adresse}</div>
              </div>
              <div class="pot-dot ${potDot[b.potentiel] || 'pd-moyen'}"></div>
            </div>
            <div class="bcard-divider"></div>
            <div class="bcard-row2">
              <div class="bcard-prix">${(parseInt(b.prix) || 0).toLocaleString('fr-FR')} €</div>
              <div class="bcard-meta">
                <span class="bcard-meta-top">${b.surface || '?'}m² · DPE ${b.dpe || '?'}</span>
                <span class="bcard-meta-statut" style="color:${stColor[b.statut] || stColor.new}">
                  ${stLabel[b.statut] || 'Nouveau'}
                </span>
              </div>
            </div>
          </div>`).join('');
      }


      // ══════════════════════════════════════════════════════════════
      // SÉLECTION D'UN BIEN
      // Appelée au clic sur une card
      // Normalise les champs pour compatibilité n8n ↔ dashboard :
      //   n8n peut envoyer : localisation, analyse, script, sript, accroche
      //   dashboard attend : adresse, score_desc, approche, mail_corps
      // ══════════════════════════════════════════════════════════════
      function sel(id) {
        // Comparaison en String des deux côtés
        // (n8n envoie des IDs string, les données démo utilisent des numbers)
        const raw = BIENS.find(x => String(x.id) === String(id));
        if (!raw) return;

        selectedId = id;

        // ── Normalisation des champs ──────────────────────────────
        const b = {
          id:         raw.id,
          type:       raw.type       || 'Appartement',
          emoji:      raw.emoji      || '🏠',
          titre:      raw.titre      || raw.localisation || 'Bien sans titre',
          adresse:    raw.adresse    || raw.localisation || '—',
          prix:       parseInt(raw.prix)    || 0,
          surface:    parseInt(raw.surface) || 0,
          pieces:     parseInt(raw.pieces)  || 0,
          // 'etages' (avec s) est une typo connue de n8n — on gère les deux
          etage:      raw.etage  || raw.etages || '—',
          dpe:        raw.dpe        || '?',
          source:     raw.source     || 'PAP',
          date:       raw.date || raw.date_annonce || "Aujourd'hui",
          statut:     raw.statut     || 'new',
          // Potentiel déduit du score si absent
          potentiel:  raw.potentiel  || (raw.score >= 70 ? 'fort' : raw.score >= 40 ? 'moyen' : 'faible'),
          score:      parseInt(raw.score) || 0,
          // score_desc peut venir de 'score_raison' ou 'analyse'
          score_desc: raw.score_desc || raw.score_raison || raw.analyse || '',
          // Points forts : tableau ou fallback depuis les champs texte n8n
          points: raw.points || [
            raw.accroche     && { ico: '⭐', cls: 'pic-o', label: 'Point fort',  desc: raw.accroche },
            raw.score_raison && { ico: '🔍', cls: 'pic-g', label: 'Analyse IA', desc: raw.score_raison },
          ].filter(Boolean),
          // 'sript' est une typo connue de n8n — on gère les deux
          approche:   raw.approche   || raw.script || raw.sript || '',
          mail_objet: raw.mail_objet || `Votre bien — ${raw.adresse || raw.localisation || ''}`,
          // mail_corps peut venir de 'accroche' ou 'sript'
          mail_corps: raw.mail_corps || raw.script || raw.sript || raw.accroche || ''
        };

        // Active le bouton PDF
        const btnPdf = document.getElementById('btn-pdf');
        if (btnPdf) btnPdf.disabled = false;

        // Re-render la liste pour mettre la carte sélectionnée en .active
        renderList();

        // Cache l'état vide, affiche le panneau de détail
        document.getElementById('detail-empty').style.display = 'none';
        const sc = document.getElementById('detail-scroll');
        sc.style.display = 'flex';

        // Correspondances potentiel → classes CSS
        const ptCls   = { fort: 'pt-f',  moyen: 'pt-m',  faible: 'pt-w' };
        const ptLabel = { fort: '⭐ Fort potentiel', moyen: '🔶 Potentiel moyen', faible: '🔻 Faible potentiel' };
        const psCls   = { fort: 'ps-f',  moyen: 'ps-m',  faible: 'ps-w' };
        const pbCls   = { fort: 'pb-f',  moyen: 'pb-m',  faible: 'pb-w' };
        const ptScore = { fort: 'Fort',  moyen: 'Moyen',  faible: 'Faible' };

        // Injection du HTML complet dans le panneau de détail
        sc.innerHTML = `

          <!-- Carte principale : source, titre, prix, tags, actions -->
          <div class="dh-wrap">
            <div class="dh-top">
              <div>
                <div class="dh-source">${b.source} · ${b.date}</div>
                <div class="dh-title">${b.emoji} ${b.titre}</div>
                <div class="dh-addr">📍 ${b.adresse}</div>
              </div>
              <div>
                <div class="dh-prix">${b.prix.toLocaleString('fr-FR')} €</div>
                <div class="dh-m2">${b.surface > 0 ? Math.round(b.prix / b.surface).toLocaleString('fr-FR') + ' €/m²' : '—'}</div>
              </div>
            </div>
            <div class="dh-tags">
              <span class="dh-tag">${b.surface} m²</span>
              <span class="dh-tag">${b.pieces} pièces</span>
              <span class="dh-tag">${b.etage}</span>
              <span class="dh-tag">DPE ${b.dpe}</span>
              <span class="${ptCls[b.potentiel] || 'pt-m'}">${ptLabel[b.potentiel] || '🔶 Moyen'}</span>
            </div>
            <div class="dh-actions">
              <button class="btn-sm btn-send" onclick="marquer('${b.id}','sent')">✉️ Marquer envoyé</button>
              <button class="btn-sm btn-ok"   onclick="marquer('${b.id}','contact')">✅ Contacté</button>
              <button class="btn-sm btn-skip" onclick="marquer('${b.id}','ignore')">Ignorer</button>
            </div>
          </div>

          <!-- Points forts -->
          <div>
            <div class="section-title">Points forts du bien</div>
            <div class="points-grid">
              ${(b.points || []).map(p => `
                <div class="point-card">
                  <div class="point-ico ${p.cls || 'pic-g'}">${p.ico || '📌'}</div>
                  <div>
                    <div class="point-label">${p.label || ''}</div>
                    <div class="point-desc">${p.desc || ''}</div>
                  </div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Score IA + Stratégie côte à côte -->
          <div class="two-cols">
            <div>
              <div class="section-title">Potentiel mandat</div>
              <div class="pot-card">
                <div class="pot-lbl">Score IA</div>
                <div class="pot-score ${psCls[b.potentiel] || 'ps-m'}">${ptScore[b.potentiel] || 'Moyen'}</div>
                <!-- Largeur de la barre = score en % -->
                <div class="pot-bar-wrap">
                  <div class="pot-bar ${pbCls[b.potentiel] || 'pb-m'}" style="width:${b.score}%"></div>
                </div>
                <div class="pot-desc">${b.score_desc}</div>
              </div>
            </div>
            <div>
              <div class="section-title">Stratégie d'approche</div>
              <div class="approche-card">
                <div class="approche-lbl">Recommandation IA</div>
                <div class="approche-txt">${b.approche}</div>
              </div>
            </div>
          </div>

          <!-- Mail d'approche -->
          <div>
            <div class="section-title">Mail d'approche</div>
            <div class="mail-wrap">
              <div class="mail-head">
                <div class="mail-objet">Objet : ${b.mail_objet}</div>
                <!-- Copie le corps du mail dans le presse-papiers -->
                <button class="mail-copy" onclick="copier('${b.id}')">📋 Copier</button>
              </div>
              <!-- white-space:pre-line dans le CSS préserve les sauts de ligne -->
              <div class="mail-body">${b.mail_corps}</div>
            </div>
          </div>`;
      }


      // ══════════════════════════════════════════════════════════════
      // MARQUER LE STATUT D'UN BIEN
      // Mise à jour locale immédiate + sync serveur en arrière-plan
      // ══════════════════════════════════════════════════════════════
      async function marquer(id, statut) {
        const b = BIENS.find(x => String(x.id) === String(id));
        if (!b) return;

        // Mise à jour locale immédiate (sans attendre le serveur)
        b.statut = statut;

        // Sync serveur en arrière-plan — silencieux si échec
        fetch(`${BASE}/api/pige/bien/${id}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ statut })
        }).catch(() => {});

        updateStats();
        renderList();

        const labels = { sent: 'Marqué envoyé', contact: 'Contacté', ignore: 'Ignoré' };
        toast('✅', labels[statut] || statut, b.titre);

        // Re-affiche le détail avec le nouveau statut
        sel(id);
      }


      // ══════════════════════════════════════════════════════════════
      // COPIER LE MAIL DANS LE PRESSE-PAPIERS
      // ══════════════════════════════════════════════════════════════
      function copier(id) {
        const b = BIENS.find(x => String(x.id) === String(id));
        if (!b) return;
        navigator.clipboard.writeText(b.mail_corps).catch(() => {});
        toast('📋', 'Copié', 'Mail prêt à coller');
      }


      // ══════════════════════════════════════════════════════════════
      // EXPORT PDF — FICHE DU BIEN SÉLECTIONNÉ
      // Génère un fichier HTML standalone téléchargeable
      // Le fichier contient un bouton "Imprimer" pour l'export PDF final
      // Workflow : télécharger → ouvrir dans Chrome → Imprimer → PDF
      // ══════════════════════════════════════════════════════════════
      function exportPDF() {
        if (!selectedId) return;
        const raw = BIENS.find(x => String(x.id) === String(selectedId));
        if (!raw) return;

        // Normalisation identique à sel() pour éviter les champs undefined
        const b = {
          titre:      raw.titre      || raw.localisation || 'Bien sans titre',
          adresse:    raw.adresse    || raw.localisation || '—',
          prix:       parseInt(raw.prix)    || 0,
          surface:    parseInt(raw.surface) || 0,
          pieces:     parseInt(raw.pieces)  || 0,
          etage:      raw.etage  || raw.etages || '—',
          dpe:        raw.dpe        || '?',
          source:     raw.source     || 'PAP',
          date:       raw.date || raw.date_annonce || "Aujourd'hui",
          potentiel:  raw.potentiel  || 'moyen',
          score:      parseInt(raw.score) || 0,
          points:     raw.points || [
            raw.accroche     && { ico: '⭐', label: 'Point fort',  desc: raw.accroche },
            raw.score_raison && { ico: '🔍', label: 'Analyse IA', desc: raw.score_raison },
          ].filter(Boolean),
          approche:   raw.approche   || raw.script || raw.sript || '',
          mail_objet: raw.mail_objet || '',
          mail_corps: raw.mail_corps || raw.script || raw.sript || raw.accroche || ''
        };

        const now = new Date();
        const ds  = now.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        const pvCol = { fort: '#2a8a60', moyen: '#c87020', faible: '#c84040' };
        const pvBg  = { fort: 'rgba(42,138,96,.08)', moyen: 'rgba(200,112,32,.07)', faible: 'rgba(200,64,64,.07)' };
        const pvLbl = { fort: '⭐ Fort potentiel', moyen: '🔶 Potentiel moyen', faible: '🔻 Faible potentiel' };

        // HTML des points forts pour la fiche
        const ptsHtml = (b.points || []).map(p => `
          <div class="pt">
            <div class="pt-header">
              <span class="pt-ico">${p.ico || '📌'}</span>
              <span class="pt-title">${p.label || ''}</span>
            </div>
            <div class="pt-body">${p.desc || ''}</div>
          </div>`).join('');

        // Paragraphes du mail (split sur double saut de ligne)
        const mailHtml = (b.mail_corps || '')
          .split('\n\n')
          .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
          .join('');

        // ── HTML de la fiche standalone ────────────────────────────
        const html = `<!DOCTYPE html>

  /* Bande dorée décorative en haut */

  .print-btn:hover { opacity: .9; }
  </style></head><body>
  <div class="page">
    <div class="stripe"></div>
    <div class="header">
      <div>
        <div class="eyebrow">${b.source} &nbsp;·&nbsp; Annonce particulier &nbsp;·&nbsp; ${b.date}</div>
        <div class="title">${b.titre}</div>
        <div class="addr">📍 &nbsp;${b.adresse}</div>
        <div class="tags">
          ${[b.surface + '&thinsp;m²', b.pieces + ' pièces', b.etage, 'DPE&nbsp;' + b.dpe].map(t => '<span class="tag">' + t + '</span>').join('')}
          <span class="pot-tag">${pvLbl[b.potentiel] || pvLbl.moyen}</span>
        </div>
      </div>
      <div class="right">
        <div class="prix">${b.prix.toLocaleString('fr-FR')}&thinsp;€</div>
        <div class="m2">${b.surface > 0 ? Math.round(b.prix / b.surface).toLocaleString('fr-FR') + '&thinsp;€/m²' : '—'}</div>
      </div>
    </div>
    <div class="sec-pts">
      <div class="sec">Points forts du bien</div>
      <div class="pts-grid">${ptsHtml}</div>
    </div>
    <div class="sec-approche">
      <div class="sec">Stratégie d'approche</div>
      <div class="approche">
        <div class="app-lbl">Recommandation IA <span class="app-score">Score ${b.score}/100</span></div>
        <div class="app-txt">${b.approche}</div>
      </div>
    </div>
    <div class="sec-mail">
      <div class="sec">Mail d'approche suggéré</div>
      <div class="mail-card">
        <div class="mail-head">
          <div class="mail-dot"></div>
          <div class="mail-subj">Objet&nbsp;: ${b.mail_objet}</div>
        </div>
        <div class="mail-body">${mailHtml}</div>
      </div>
    </div>
    <div class="footer">
      <div class="footer-brand">Lead<em>Flow</em> &nbsp;·&nbsp; Pige automatisée</div>
      <div class="footer-date">Généré le ${ds}</div>
    </div>
  </div>
  <button class="print-btn no-print" onclick="window.print()">🖨&nbsp; Imprimer / Enregistrer en PDF</button>
  </body></html>`;

        // Téléchargement via Blob — crée un lien temporaire et le clique automatiquement
        const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'fiche-pige-' + (b.adresse || 'bien').replace(/[^a-zA-Z0-9]/g, '-').toLowerCase().slice(0, 40) + '.html';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url); // libère la mémoire

        toast('📄', 'Fiche téléchargée', 'Ouvre dans Chrome → Imprimer → PDF');
      }


      // ══════════════════════════════════════════════════════════════
      // TOAST — notification temporaire (disparaît après 3 secondes)
      // ══════════════════════════════════════════════════════════════
      function toast(ico, title, desc) {
        const wrap = document.getElementById('toasts');
        const el   = document.createElement('div');
        el.className = 'toast';
        el.innerHTML = `<span style="font-size:15px">${ico}</span><div><div class="toast-t">${title}</div><div class="toast-d">${desc}</div></div>`;
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 3000);
      }


      // ══════════════════════════════════════════════════════════════
      // DÉMARRAGE
      // ══════════════════════════════════════════════════════════════
      init();
    </script>
  </body>
</html>
