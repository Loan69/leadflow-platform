<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadFlow — Pige</title>
    <!--
      ══════════════════════════════════════════════════════════════
      DASHBOARD PIGE AUTOMATISÉE — LeadFlow
      ══════════════════════════════════════════════════════════════
      Rôle : afficher les biens scrapés depuis PAP/LBC chaque matin
            par le workflow n8n, avec leur analyse IA.
    
      Stack : HTML/CSS/JS vanilla — aucune dépendance externe JS
      Fonts : Google Fonts (Cormorant Garamond, Figtree, DM Mono)
      Serveur : pige-server.js sur port 3004 (localhost ou Railway)
    
      Flux de données :
        n8n scrape PAP/LBC → analyse Claude → POST /api/pige/bien
        → ce dashboard poll GET /api/pige/biens toutes les 30s
        → affiche les biens dans la sidebar + détail au clic
    
      Pour modifier l'URL du serveur : chercher BASE_URL dans le JS
      ══════════════════════════════════════════════════════════════
    -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Figtree:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      /* ══════════════════════════════════════════
        RESET & VARIABLES CSS
        Palette : crème/or cohérente avec LeadFlow
        ══════════════════════════════════════════ 
      */
      *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
      :root{
        /* Fonds */
        --cream:#f7f4ee; /* fond général */
        --cream2: #f0ebe0;   /* fond légèrement plus foncé */
        --cream3: #e8e0d0;   /* fond encore plus foncé */
        /* Texte */
        --ink:    #1c1a16;   /* texte principal */
        --ink3:   #4a4640;   /* texte secondaire */
        --muted:  #8a8478;   /* texte atténué */
        --pale:   #b8b0a0;   /* texte très atténué */
      
        /* Accents */
        --gold:   #b8893a;   /* or principal */
        --gold2:  #d4a853;   /* or clair */
        --green:  #2a8a60;   /* vert succès / potentiel fort */
        --red:    #c84040;   /* rouge danger / potentiel faible */
        --orange: #c87020;   /* orange avertissement / potentiel moyen */
      
        /* Bordures */
        --border:  #e0d8c8;
        --border2: #d0c8b8;
      }
      /* L'app prend toute la hauteur de la fenêtre sans scroll */
      html,body{height:100%;overflow:hidden;}
      body {
        font-family:'Figtree',sans-serif;
        background:var(--cream);
        color:var(--ink);
        font-size:13px;
        line-height:1.6;
        display:flex;
        flex-direction:column; /* header en haut, stats-bar, puis app-body */
      }

      /* Header */
      header{display:flex;align-items:center;justify-content:space-between;padding:0 28px;height:54px;background:rgba(247,244,238,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);flex-shrink:0;z-index:50;}
      .logo{display:flex;align-items:center;gap:11px;}
      .logo-mark{width:30px;height:30px;background:linear-gradient(135deg,var(--gold),var(--gold2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px;}
      .logo-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;}
      .logo-name em{font-style:italic;color:var(--gold);}
      .logo-sub{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
      .header-right{display:flex;align-items:center;gap:10px;}
      .date-badge{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;padding:3px 10px;background:var(--cream2);border:1px solid var(--border);border-radius:6px;}
      .btn-pdf{display:flex;align-items:center;gap:6px;background:var(--cream3);color:var(--pale);border:1px solid var(--border);padding:7px 16px;border-radius:8px;font-family:'Figtree',sans-serif;font-size:12px;font-weight:500;cursor:not-allowed;transition:all .2s;opacity:.55;}
      .btn-pdf:not([disabled]){background:linear-gradient(135deg,var(--gold),var(--gold2));color:white;border:none;cursor:pointer;opacity:1;}
      .btn-pdf:not([disabled]):hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(184,137,58,.3);}

      /* Stats */
      .stats-bar{display:flex;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0;}
      .stat-item{flex:1;padding:10px 20px;display:flex;align-items:center;gap:12px;border-right:1px solid var(--border);}
      .stat-item:last-child{border-right:none;}
      .stat-val{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--ink);line-height:1;}
      .stat-label{font-size:10px;color:var(--muted);margin-top:2px;}

      /* App */
      .app-body{display:flex;flex:1;overflow:hidden;}

      /* Sidebar */
      .sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;background:var(--white);}
      .sidebar-search{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
      .search-wrap{position:relative;}
      .search-input{width:100%;background:var(--cream);border:1px solid var(--border2);border-radius:8px;padding:7px 10px 7px 30px;font-family:'Figtree',sans-serif;font-size:12px;color:var(--ink);outline:none;transition:border-color .2s;}
      .search-input:focus{border-color:var(--gold);background:white;}
      .search-input::placeholder{color:var(--pale);}
      .search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--pale);font-size:12px;pointer-events:none;}

      /* Pills minimalistes */
      .pot-pills{display:flex;gap:4px;padding:8px 14px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
      .ppill{flex:1;padding:4px 0;text-align:center;background:var(--cream2);border:1px solid var(--border);border-radius:6px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s;font-family:'Figtree',sans-serif;}
      .ppill.active{background:rgba(184,137,58,.08);border-color:rgba(184,137,58,.3);color:var(--gold);}

      .sidebar-count{display:flex;align-items:center;justify-content:space-between;padding:5px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
      .count-txt{font-size:10px;color:var(--pale);}
      .count-num{font-family:'DM Mono',monospace;font-size:11px;color:var(--gold);font-weight:500;}

      .bien-list{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;}
      .bien-list::-webkit-scrollbar{width:3px;}
      .bien-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

      /* Bien card */
      .bcard{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:10px 13px;cursor:pointer;transition:all .18s;position:relative;overflow:hidden;}
      .bcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px;opacity:0;transition:opacity .2s;}
      .bcard:hover{background:white;border-color:var(--border2);}
      .bcard.active{background:white;border-color:var(--gold);}
      .bcard.active::before{background:var(--gold);opacity:1;}
      .bcard-row1{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4px;}
      .bcard-title{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.35;}
      .bcard-addr{font-size:11px;color:var(--muted);margin-top:2px;}
      .pot-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
      .pd-fort{background:var(--green);}
      .pd-moyen{background:var(--orange);}
      .pd-faible{background:var(--red);}
      .bcard-row2{display:flex;align-items:center;justify-content:space-between;margin-top:6px;}
      .bcard-prix{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--gold);}
      .bcard-meta{font-size:10px;color:var(--pale);}

      /* Detail */
      .detail-pane{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--cream);}
      .detail-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;}
      .detail-empty-icon{font-size:36px;opacity:.18;}
      .detail-empty-txt{font-size:12px;color:var(--pale);}
      .detail-scroll{flex:1;overflow-y:auto;padding:22px 26px;display:flex;flex-direction:column;gap:18px;}
      .detail-scroll::-webkit-scrollbar{width:3px;}
      .detail-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

      /* Detail head */
      .dh-wrap{background:var(--white);border:1px solid var(--border);border-radius:13px;padding:18px 22px;}
      .dh-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
      .dh-source{font-size:9px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:4px;}
      .dh-title{font-family:'Cormorant Garamond',serif;font-size:21px;font-weight:400;color:var(--ink);margin-bottom:2px;}
      .dh-addr{font-size:12px;color:var(--muted);}
      .dh-prix{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--gold);line-height:1;text-align:right;}
      .dh-m2{font-size:11px;color:var(--muted);text-align:right;margin-top:2px;}
      .dh-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
      .dh-tag{padding:3px 9px;border-radius:5px;font-size:11px;background:var(--cream2);border:1px solid var(--border);color:var(--ink3);}
      .dh-actions{display:flex;gap:6px;}
      .btn-sm{padding:6px 13px;border-radius:7px;font-family:'Figtree',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all .18s;border:none;}
      .btn-send{background:linear-gradient(135deg,var(--gold),var(--gold2));color:white;}
      .btn-send:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(184,137,58,.3);}
      .btn-ok{background:rgba(42,138,96,.08);color:var(--green);border:1px solid rgba(42,138,96,.2)!important;}
      .btn-skip{background:var(--cream2);color:var(--muted);border:1px solid var(--border)!important;}

      /* Section title */
      .section-title{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
      .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

      /* Points */
      .points-grid{display:flex;flex-direction:column;gap:6px;}
      .point-card{display:flex;gap:10px;align-items:flex-start;padding:10px 13px;background:var(--white);border:1px solid var(--border);border-radius:9px;}
      .point-ico{width:26px;height:26px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;}
      .pic-g{background:rgba(42,138,96,.08);border:1px solid rgba(42,138,96,.2);}
      .pic-o{background:rgba(184,137,58,.08);border:1px solid rgba(184,137,58,.2);}
      .pic-b{background:rgba(58,112,200,.06);border:1px solid rgba(58,112,200,.18);}
      .pic-r{background:rgba(200,112,32,.06);border:1px solid rgba(200,112,32,.18);}
      .point-label{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:1px;}
      .point-desc{font-size:11px;color:var(--ink3);line-height:1.5;font-weight:300;}

      /* Two cols */
      .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:12px;}

      /* Potentiel */
      .pot-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:15px;}
      .pot-lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;}
      .pot-score{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;line-height:1;margin-bottom:7px;}
      .ps-f{color:var(--green);}
      .ps-m{color:var(--orange);}
      .ps-w{color:var(--red);}
      .pot-bar-wrap{height:5px;background:var(--cream3);border-radius:3px;overflow:hidden;margin-bottom:8px;}
      .pot-bar{height:100%;border-radius:3px;}
      .pb-f{background:linear-gradient(90deg,var(--green),#40aa80);}
      .pb-m{background:linear-gradient(90deg,var(--orange),#e09040);}
      .pb-w{background:linear-gradient(90deg,var(--red),#e06060);}
      .pot-desc{font-size:11px;color:var(--ink3);line-height:1.55;font-weight:300;}

      /* Approche */
      .approche-card{background:var(--ink);border-radius:10px;padding:15px;position:relative;overflow:hidden;}
      .approche-card::before{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle,rgba(184,137,58,.12) 0%,transparent 70%);}
      .approche-lbl{font-size:9px;color:var(--gold);text-transform:uppercase;letter-spacing:2px;margin-bottom:7px;font-weight:600;}
      .approche-txt{font-size:11.5px;color:rgba(247,244,238,.75);line-height:1.7;font-weight:300;position:relative;z-index:1;}

      /* Mail */
      .mail-wrap{background:var(--white);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
      .mail-head{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);background:var(--cream2);}
      .mail-objet{font-size:12px;font-weight:500;color:var(--ink);}
      .mail-copy{font-size:10px;color:var(--gold);cursor:pointer;background:none;border:none;font-family:'Figtree',sans-serif;font-weight:600;transition:opacity .2s;}
      .mail-copy:hover{opacity:.6;}
      .mail-body{padding:13px 15px;font-size:11.5px;color:var(--ink3);line-height:1.8;font-weight:300;white-space:pre-line;}

      /* Toast */
      .toast-wrap{position:fixed;bottom:18px;right:18px;z-index:400;display:flex;flex-direction:column;gap:6px;}
      .toast{background:var(--ink);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;min-width:220px;box-shadow:0 8px 28px rgba(28,26,22,.22);animation:toastIn .25s ease;}
      @keyframes toastIn{from{opacity:0;transform:translateX(16px);}to{opacity:1;transform:translateX(0);}}
      .toast-t{font-size:12px;font-weight:500;color:#f7f4ee;}
      .toast-d{font-size:10.5px;color:rgba(247,244,238,.5);margin-top:1px;}

      /* Potential tag inline */
      .pt-f{background:rgba(42,138,96,.08);color:var(--green);border:1px solid rgba(42,138,96,.2);padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:600;display:inline-flex;align-items:center;gap:3px;}
      .pt-m{background:rgba(200,112,32,.06);color:var(--orange);border:1px solid rgba(200,112,32,.2);padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:600;}
      .pt-w{background:rgba(200,64,64,.06);color:var(--red);border:1px solid rgba(200,64,64,.2);padding:3px 9px;border-radius:5px;font-size:10.5px;font-weight:600;}

      /* ── PDF ── */
      @media print{
        @page{size:A4 portrait;margin:10mm 13mm;}
        html,body{height:auto!important;overflow:visible!important;}
        header,.stats-bar,.sidebar,.toast-wrap,.detail-pane{display:none!important;}
        .app-body{display:block!important;}
        #pdf-container{display:block!important;}
        body{background:white;font-size:10px;
        -webkit-print-color-adjust:exact;
        print-color-adjust:exact;}
      }
      #pdf-container{display:none;}

      /* Fiches PDF */
      .pdf-cover{background:#1c1a16;padding:18px 22px;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:space-between;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .pdf-cover-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:#f7f4ee;}
      .pdf-cover-meta{font-size:9px;color:rgba(247,244,238,.4);margin-top:3px;font-family:'DM Mono',monospace;}
      .pdf-cover-brand{font-family:'Cormorant Garamond',serif;font-size:13px;color:rgba(247,244,238,.35);}
      .pdf-cover-brand em{font-style:italic;color:#b8893a;}

      .pdf-fiche{background:white;border:1px solid #e0d8c8;border-radius:10px;overflow:hidden;margin-top:12px;page-break-inside:avoid;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
      .pdf-fiche-head{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e8e0d0;background:#f7f4ee;}
      .pf-type{font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:#b8893a;margin-bottom:3px;}
      .pf-title{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;color:#1c1a16;margin-bottom:2px;}
      .pf-addr{font-size:9px;color:#8a8478;}
      .pf-prix{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:#b8893a;text-align:right;line-height:1;}
      .pf-m2{font-size:9px;color:#8a8478;text-align:right;margin-top:2px;}

      .pdf-tags{display:flex;gap:4px;padding:7px 16px;border-bottom:1px solid #f0ebe0;flex-wrap:wrap;}
      .pdf-tag{padding:2px 7px;border-radius:4px;font-size:8.5px;background:#f0ebe0;border:1px solid #e0d8c8;color:#4a4640;}
      .pdf-pot-f{padding:2px 7px;border-radius:4px;font-size:8.5px;font-weight:600;background:rgba(42,138,96,.08);color:#2a8a60;border:1px solid rgba(42,138,96,.18);}
      .pdf-pot-m{padding:2px 7px;border-radius:4px;font-size:8.5px;font-weight:600;background:rgba(200,112,32,.07);color:#c87020;border:1px solid rgba(200,112,32,.18);}
      .pdf-pot-w{padding:2px 7px;border-radius:4px;font-size:8.5px;font-weight:600;background:rgba(200,64,64,.07);color:#c84040;border:1px solid rgba(200,64,64,.18);}

      .pdf-body{display:grid;grid-template-columns:1fr 1fr;}
      .pdf-points{padding:10px 14px;border-right:1px solid #f0ebe0;}
      .pdf-pts-title{font-size:7.5px;color:#8a8478;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:7px;}
      .pdf-pt{display:flex;gap:6px;margin-bottom:5px;}
      .pdf-pt-dot{width:5px;height:5px;border-radius:50%;background:#b8893a;flex-shrink:0;margin-top:3px;}
      .pdf-pt-lbl{font-size:9.5px;font-weight:500;color:#1c1a16;}
      .pdf-pt-desc{font-size:8.5px;color:#4a4640;line-height:1.5;font-weight:300;}

      .pdf-approche{padding:10px 14px;background:#1c1a16;}
      .pdf-app-title{font-size:7.5px;color:#b8893a;text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:6px;}
      .pdf-app-txt{font-size:9.5px;color:rgba(247,244,238,.72);line-height:1.65;font-weight:300;}

      .pdf-mail{padding:9px 16px;border-top:1px solid #f0ebe0;background:#faf8f4;}
      .pdf-mail-lbl{font-size:7.5px;color:#8a8478;text-transform:uppercase;letter-spacing:2px;margin-bottom:3px;font-weight:600;}
      .pdf-mail-obj{font-size:9.5px;font-weight:500;color:#1c1a16;margin-bottom:4px;}
      .pdf-mail-txt{font-size:9px;color:#4a4640;line-height:1.65;font-weight:300;white-space:pre-line;}

      .pdf-break{page-break-before:always;}
      .pdf-footer{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-top:1px solid #e0d8c8;margin-top:10px;}
      .pdf-footer-brand{font-family:'Cormorant Garamond',serif;font-size:12px;color:#8a8478;}
      .pdf-footer-brand em{font-style:italic;color:#b8893a;}
      .pdf-footer-info{font-size:8.5px;color:#b8b0a0;font-family:'DM Mono',monospace;}
    </style>
  </head>
  <body>

    <header>
      <div class="logo">
        <div class="logo-mark">🔍</div>
        <div>
          <div class="logo-name">Lead<em>Flow</em></div>
          <div class="logo-sub">Pige automatisée</div>
        </div>
      </div>
      <div class="header-right">
        <span class="date-badge" id="date-badge">—</span>
        <button class="btn-pdf" id="btn-pdf" onclick="exportPDF()" disabled>🖨 Fiche PDF</button>
      </div>
    </header>

    <div class="stats-bar">
      <div class="stat-item"><div><div class="stat-val" id="s-total">5</div><div class="stat-label">Biens analysés</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-fort" style="color:var(--green)">3</div><div class="stat-label">Fort potentiel</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-new">2</div><div class="stat-label">Nouveaux</div></div></div>
      <div class="stat-item"><div><div class="stat-val" id="s-sent" style="color:#3a70c8">1</div><div class="stat-label">Mails envoyés</div></div></div>
    </div>

    <div class="app-body">
      <div class="sidebar">
        <div class="sidebar-search">
          <div class="search-wrap">
            <span class="search-ico">🔍</span>
            <input class="search-input" id="search-input" placeholder="Rechercher…" oninput="renderList()">
          </div>
        </div>
        <div class="pot-pills">
          <button class="ppill active" onclick="setPot(this,'all')">Tous</button>
          <button class="ppill" onclick="setPot(this,'fort')">⬤ Fort</button>
          <button class="ppill" onclick="setPot(this,'moyen')">⬤ Moyen</button>
          <button class="ppill" onclick="setPot(this,'faible')">⬤ Faible</button>
        </div>
        <div class="sidebar-count">
          <span class="count-txt">Biens affichés</span>
          <span class="count-num" id="bien-count">5</span>
        </div>
        <div class="bien-list" id="bien-list"></div>
      </div>

      <div class="detail-pane">
        <div class="detail-empty" id="detail-empty">

      async function init2() {
        try {
          const res  = await fetch(`${BASE}/api/pige/biens`);
          BIENS = await res.json();
          updateStats();
          renderList();
          if (BIENS.length > 0) {
            toast('🔍', 'Pige chargée', `${BIENS.length} biens analysés`);
          }
          // Polling toutes les 30 secondes pour les nouveaux biens
          setInterval(async () => {
            const r = await fetch(`${BASE}/api/pige/biens`);
            const nouveaux = await r.json();
            if (nouveaux.length > BIENS.length) {
              const diff = nouveaux.length - BIENS.length;
              BIENS = nouveaux;
              updateStats();
              renderList();
              toast('🆕', `${diff} nouveau${diff>1?'x':''} bien${diff>1?'s':''}`, 'Pige mise à jour');
            }
          }, 30000);
        } catch(e) {
          console.error('Serveur pige non disponible');
        }
      }

        document.getElementById('s-total').textContent=BIENS.length;
        document.getElementById('s-fort').textContent=BIENS.filter(b=>b.potentiel==='fort').length;
        document.getElementById('s-new').textContent=BIENS.filter(b=>b.statut==='new').length;
        document.getElementById('s-sent').textContent=BIENS.filter(b=>b.statut==='sent').length;

        const f=BIENS.filter(b=>(potFilter==='all'||b.potentiel===potFilter)&&(!q||b.titre.toLowerCase().includes(q)||b.adresse.toLowerCase().includes(q)));

      // ══════════════════════════════════════════════════════════════
// SÉLECTION D'UN BIEN
// Appelée au clic sur une card — affiche le détail complet
// Normalise les champs pour compatibilité avec les données n8n
// (n8n envoie : localisation, analyse, script, accroche)
// (dashboard attend : adresse, score_desc, approche, mail_corps)
// ══════════════════════════════════════════════════════════════
function sel(id) {
  selectedId = id;
 
  // Normalisation des champs — compatibilité n8n ↔ dashboard
  // Les champs venant de n8n peuvent avoir des noms différents
  let raw = BIENS.find(x => x.id === id);
  if (raw) { //return;
 
  const c = {
    id:         raw.id,
    type:       raw.type       || 'Appartement',
    emoji:      raw.emoji      || '🏠',
    titre:      raw.titre      || raw.localisation || 'Bien sans titre',
    adresse:    raw.adresse    || raw.localisation  || '—',
    prix:       parseInt(raw.prix)     || 0,
    surface:    parseInt(raw.surface)  || 0,
    pieces:     parseInt(raw.pieces)   || 0,
    etage:      raw.etage      || '—',
    dpe:        raw.dpe        || '?',
    source:     raw.source     || 'PAP',
    url:        raw.url        || '',
    date:       raw.date       || "Aujourd'hui",
    statut:     raw.statut     || 'new',
    // Potentiel : utilise le champ direct ou le déduit du score
    potentiel:  raw.potentiel  || (raw.score >= 70 ? 'fort' : raw.score >= 40 ? 'moyen' : 'faible'),
    score:      parseInt(raw.score)    || 0,
    // score_desc peut venir du champ 'analyse' de n8n
    score_desc: raw.score_desc || raw.analyse || '',
    // points : tableau de points forts — ou fallback depuis analyse texte
    points: raw.points || (raw.analyse ? [
      { ico: '🔍', cls: 'pic-g', label: 'Analyse IA', desc: raw.analyse }
    ] : []),
    // approche peut venir du champ 'script' de n8n
    approche:   raw.approche   || raw.script   || '',
    mail_objet: raw.mail_objet || `Votre bien — ${raw.localisation || raw.adresse || ''}`,
    // mail_corps peut venir du champ 'accroche' de n8n
    mail_corps: raw.mail_corps || raw.accroche || ''
  };}
 
  // Active le bouton PDF maintenant qu'un bien est sélectionné
  const btnPdf = document.getElementById('btn-pdf');
  if (btnPdf) btnPdf.disabled = false;
 
  // Re-render la liste pour mettre à jour la card active
  renderList();
 
  // Cache l'état vide, affiche le détail
  document.getElementById('detail-empty').style.display = 'none';
  const sc = document.getElementById('detail-scroll');
  sc.style.display = 'flex';
 
  // Correspondances potentiel → classes CSS
  const ptCls   = { fort: 'pt-f',  moyen: 'pt-m',  faible: 'pt-w'  };
  const ptLabel = { fort: '⭐ Fort potentiel', moyen: '🔶 Potentiel moyen', faible: '🔻 Faible potentiel' };
  const psCls   = { fort: 'ps-f',  moyen: 'ps-m',  faible: 'ps-w'  };
  const pbCls   = { fort: 'pb-f',  moyen: 'pb-m',  faible: 'pb-w'  };
  const ptScore = { fort: 'Fort',  moyen: 'Moyen',  faible: 'Faible' };

  const b = BIENS.find(x => x.id === id);
 
  // Injection du HTML du détail complet
        sc.innerHTML=`
          <div class="dh-wrap">
            <div class="dh-top">
              <div><div class="dh-source">${b.source} · ${b.date}</div><div class="dh-title">${b.emoji} ${b.titre}</div><div class="dh-addr">📍 ${b.adresse}</div></div>
              <div><div class="dh-prix">${b.prix.toLocaleString('fr-FR')} €</div><div class="dh-m2">${Math.round(b.prix/b.surface).toLocaleString('fr-FR')} €/m²</div></div>
            </div>
            <div class="dh-tags">
              <span class="dh-tag">${b.surface} m²</span><span class="dh-tag">${b.pieces} pièces</span>
              <span class="dh-tag">${b.etage}</span><span class="dh-tag">DPE ${b.dpe}</span>
              <span class="${ptCls[b.potentiel]}">${ptLabel[b.potentiel]}</span>
            </div>
            <div class="dh-actions">
              <button class="btn-sm btn-send" onclick="marquer(${b.id},'sent')">✉️ Marquer envoyé</button>
              <button class="btn-sm btn-ok" onclick="marquer(${b.id},'contact')">✅ Contacté</button>
              <button class="btn-sm btn-skip" onclick="marquer(${b.id},'ignore')">Ignorer</button>
            </div>
          </div>
          <div>
            <div class="section-title">Points forts du bien</div>
            <div class="points-grid">${b.points.map(p=>`
              <div class="point-card">

              </div>`).join('')}</div>

              <div class="section-title">Potentiel mandat</div>

                <div class="pot-bar-wrap"><div class="pot-bar ${pbCls[b.potentiel]}" style="width:${b.score}%"></div></div>
                <div class="pot-desc">${b.score_desc}</div>
              </div>
            </div>
            <div>

      // synchroniser avec le serveur
      async function marquer(id, statut) {
        const b = BIENS.find(x => x.id === id);
        if (!b) return;
        b.statut = statut;
        // Sync serveur
        fetch(`${BASE}/api/pige/bien/${id}`, {
          method:  'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ statut })
        });
        updateStats(); renderList();
        const l = { sent:'Marqué envoyé', contact:'Contacté', ignore:'Ignoré' };
        toast('✅', l[statut], b.titre);
        sel(id);
      }

        const b=BIENS.find(x=>x.id===id);if(!b)return;

            <div class="pt-body">${p.desc}</div>

          .map(p=>`<p>${p.replace(/\n/g,' ')}</p>`).join('');

        const html=`<!DOCTYPE html>
      <html lang="fr">

        display: flex;

        text-transform: uppercase; letter-spacing: 2.5px;
        font-weight: 700; margin-bottom: 10px;
        display: flex; align-items: center; gap: 10px;
      }
      .sec-title::after {
        content: ''; flex: 1; height: 1px; background: #e8e0d0;
      }

      /* ── Points forts ── */
      .section-pts { margin-bottom: 22px; }
      .pts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .pt {
        background: #f7f4ee; border: 1px solid #e8e0d0;
        border-radius: 8px; padding: 10px 12px;
      }
      .pt-header {
        display: flex; align-items: center; gap: 7px; margin-bottom: 4px;
      }
      .pt-ico { font-size: 15px; flex-shrink: 0; }
      .pt-title { font-size: 10.5px; font-weight: 600; color: #1c1a16; }
      .pt-body { font-size: 9.5px; color: #4a4640; line-height: 1.55; }

      /* ── Approche ── */
      .section-approche { margin-bottom: 22px; }
      .approche-card {
        background: #1c1a16; border-radius: 10px;
        padding: 16px 18px;
        position: relative; overflow: hidden;
      }
      .approche-card::before {
        content: '';
        position: absolute; top: -30px; right: -30px;
        width: 100px; height: 100px; border-radius: 50%;
        background: radial-gradient(circle, rgba(184,137,58,.12) 0%, transparent 70%);
      }
      .approche-lbl {
        font-size: 8px; color: #b8893a;
        text-transform: uppercase; letter-spacing: 2.5px;
        font-weight: 700; margin-bottom: 8px;
      }
      .approche-score {
        display: inline-block; margin-left: 8px;
        background: rgba(184,137,58,.15); color: #d4a853;
        padding: 1px 8px; border-radius: 10px;
        font-size: 9px; font-weight: 600;
        border: 1px solid rgba(184,137,58,.25);
      }
      .approche-txt {
        font-size: 11px; color: rgba(247,244,238,.88);
        line-height: 1.75; position: relative; z-index: 1;
      }

      /* ── Mail ── */
      .section-mail { margin-bottom: 22px; }
      .mail-card { border: 1px solid #e0d8c8; border-radius: 10px; overflow: hidden; }
      .mail-card-head {
        background: #1c1a16; padding: 12px 16px;
        display: flex; align-items: center; gap: 10px;
      }
      .mail-dot { width: 7px; height: 7px; border-radius: 50%; background: #b8893a; flex-shrink: 0; }
      .mail-subject {
        font-family: Georgia, serif; font-size: 13px;
        font-weight: 300; color: #f7f4ee;
      }
      .mail-card-body { padding: 16px 18px; background: #faf8f4; }
      .mail-card-body p {
        font-size: 10.5px; color: #4a4640;
        line-height: 1.8; margin-bottom: 10px;
      }
      .mail-card-body p:last-child { margin-bottom: 0; }

      /* ── Footer ── */
      .doc-footer {
        margin-top: auto; padding-top: 16px;
        border-top: 1px solid #e8e0d0;
        display: flex; justify-content: space-between;
        align-items: center;
      }
      .footer-brand {
        font-family: Georgia, serif; font-size: 13px; color: #8a8478;
      }
      .footer-brand em { font-style: italic; color: #b8893a; }
      .footer-right { text-align: right; }
      .footer-date { font-size: 9px; color: #b8b0a0; }

      /* Bouton impression */
      .print-btn {
        display: block; margin: 20px auto 0;
        background: linear-gradient(135deg, #b8893a, #d4a853);
        color: white; border: none; padding: 10px 28px;
        border-radius: 8px; font-size: 13px; font-weight: 600;
        cursor: pointer; font-family: inherit;
        transition: all .2s;
      }
      .print-btn:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(184,137,58,.3); }
      </style>
      </head>
      <body>

      <div class="page">
        <div class="page-stripe"></div>

        <!-- Header -->
        <div class="doc-header">
          <div class="dh-left">
            <div class="dh-eyebrow">${b.source} &nbsp;·&nbsp; Annonce particulier &nbsp;·&nbsp; ${b.date}</div>
            <div class="dh-title">${b.titre}</div>
            <div class="dh-addr">📍 &nbsp;${b.adresse}</div>
            <div class="dh-tags">
              ${[b.surface+'&thinsp;m²', b.pieces+' pièces', b.etage, 'DPE&nbsp;'+b.dpe].map(t=>'<span class="tag">'+t+'</span>').join('')}
              <span class="pot-tag">${pvLbl[b.potentiel]}</span>
            </div>
          </div>
          <div class="dh-right">
            <div class="dh-prix">${b.prix.toLocaleString('fr-FR')}&thinsp;€</div>
            <div class="dh-m2">${Math.round(b.prix/b.surface).toLocaleString('fr-FR')}&thinsp;€/m²</div>
            <div class="dh-source">${b.source}</div>
          </div>
        </div>

        <!-- Points forts -->
        <div class="section-pts">
          <div class="sec-title">Points forts du bien</div>
          <div class="pts-grid">${pts}</div>
        </div>

        <!-- Stratégie -->
        <div class="section-approche">
          <div class="sec-title">Stratégie d'approche</div>
          <div class="approche-card">
            <div class="approche-lbl">
              Recommandation IA
              <span class="approche-score">Score ${b.score}/100</span>
            </div>
            <div class="approche-txt">${b.approche}</div>
          </div>
        </div>

        <!-- Mail -->
        <div class="section-mail">
          <div class="sec-title">Mail d'approche suggéré</div>
          <div class="mail-card">
            <div class="mail-card-head">
              <div class="mail-dot"></div>
              <div class="mail-subject">Objet&nbsp;: ${b.mail_objet}</div>
            </div>
            <div class="mail-card-body">${mailParas}</div>
          </div>
        </div>

        <!-- Footer -->
        <div class="doc-footer">
          <div class="footer-brand">Lead<em>Flow</em> &nbsp;·&nbsp; Pige automatisée</div>
          <div class="footer-right">
            <div class="footer-date">Généré le ${ds}</div>
          </div>
        </div>
      </div>

      <button class="print-btn no-print" onclick="window.print()">🖨&nbsp; Imprimer / Enregistrer en PDF</button>

      </body>
      </html>`;

        const blob=new Blob([html],{type:'text/html;charset=utf-8'});
        const url=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=url;
        const nom=(b.adresse||'fiche').replace(/[^a-zA-Z0-9]/g,'-').toLowerCase().slice(0,40);
        a.download='fiche-pige-'+nom+'.html';
        document.body.appendChild(a);a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        toast('📄','Fiche téléchargée — ouvre le fichier et clique Imprimer',b.titre);
      }

      function toast(ico,title,desc){
        const w=document.getElementById('toasts');
        const e=document.createElement('div');
        e.className='toast';
        e.innerHTML=`<span style="font-size:15px">${ico}</span><div><div class="toast-t">${title}</div><div class="toast-d">${desc}</div></div>`;
        w.appendChild(e);setTimeout(()=>e.remove(),3000);
      }
      init();
    </script>
  </body>
</html>
