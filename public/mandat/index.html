<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>LeadFlow — Dossier Mandat</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --cream: #f7f4ee; --cream2: #f0ebe0; --ink: #1c1a16;
    --ink3: #4a4640; --muted: #8a8478; --gold: #b8893a;
    --gold2: #d4a853; --border: #e0d8c8;
  }
  body { font-family: 'Figtree', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 540px; }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 20px; color: var(--muted); margin-bottom: 28px; }
  .logo em { font-style: italic; color: var(--gold); }
  h1 { font-size: 22px; font-weight: 400; margin-bottom: 6px; }
  .sub { font-size: 13px; color: var(--muted); margin-bottom: 28px; }
  .field { margin-bottom: 16px; }
  label { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
  input { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-family: 'Figtree', sans-serif; font-size: 14px; color: var(--ink); background: var(--cream); outline: none; transition: border-color .2s; }
  input:focus { border-color: var(--gold); background: white; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .btn { width: 100%; margin-top: 8px; background: linear-gradient(135deg, var(--gold), var(--gold2)); color: white; border: none; border-radius: 10px; padding: 13px; font-family: 'Figtree', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(184,137,58,.3); }
  .btn:disabled { opacity: .6; cursor: not-allowed; transform: none; }
  .status { margin-top: 20px; padding: 14px 16px; border-radius: 10px; font-size: 13px; display: none; }
  .status.loading { background: #f0ebe0; color: var(--ink3); display: block; }
  .status.success { background: #f0faf4; color: #2a8a60; display: block; }
  .status.error   { background: #fdf0f0; color: #c84040; display: block; }
  .step { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .step-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .step-dot.done { background: #2a8a60; }
  .step-dot.active { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">Lead<em>Flow</em> · Mandat</div>
  <h1>Dossier de prise de mandat</h1>
  <p class="sub">Entrez l'adresse du bien — le dossier PDF est prêt en 2 minutes.</p>

  <div class="field">
    <label>Adresse du bien</label>
    <input type="text" id="adresse" placeholder="12 rue de la République, Lyon 69001" value="108 rue Jean Vallier 69007 Lyon">
  </div>
  <div class="row">
    <div class="field">
      <label>Surface (m²)</label>
      <input type="number" id="surface" placeholder="75" value="45">
    </div>
    <div class="field">
      <label>Type de bien</label>
      <input type="text" id="type" placeholder="Appartement" value="Appartement">
    </div>
  </div>
  <div class="field">
    <label>Nom de votre agence</label>
    <input type="text" id="agence" placeholder="Orpi Lyon 6e" value="Orpi Lyon 7e">
  </div>

  <button class="btn" onclick="generer()">Générer le dossier PDF</button>

  <div class="status" id="status">
    <div class="step" id="step1"><div class="step-dot" id="d1"></div>Géolocalisation de l'adresse</div>
    <div class="step" id="step2"><div class="step-dot" id="d2"></div>Récupération des transactions DVF</div>
    <div class="step" id="step3"><div class="step-dot" id="d3"></div>Rédaction de l'analyse par IA</div>
    <div class="step" id="step4"><div class="step-dot" id="d4"></div>Génération du PDF</div>
  </div>
</div>

<script>
async function generer() {
  const adresse = document.getElementById('adresse').value.trim();
  const surface = document.getElementById('surface').value;
  const type    = document.getElementById('type').value || 'Appartement';
  const agence  = document.getElementById('agence').value;

  if (!adresse) { alert('Merci d\'entrer une adresse.'); return; }

  const btn    = document.querySelector('.btn');
  const status = document.getElementById('status');
  btn.disabled = true;
  status.className = 'status loading';

  function setStep(n) {
    for (let i = 1; i <= 4; i++) {
      const dot = document.getElementById('d' + i);
      dot.className = 'step-dot ' + (i < n ? 'done' : i === n ? 'active' : '');
    }
  }

  try {
    setStep(1);
    const analyseRes = await fetch('/api/analyse', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adresse })
    });
    const analyse = await analyseRes.json();
    if (!analyseRes.ok) throw new Error(analyse.error);

    setStep(2);
    await new Promise(r => setTimeout(r, 500));

    setStep(3);
    const syntheseRes = await fetch('/api/synthese', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        adresse: analyse.adresse,
        stats: analyse.stats,
        transactions: analyse.transactions,
        bienSurface: surface,
        bienType: type
      })
    });
    const syntheseData = await syntheseRes.json();
    if (!syntheseRes.ok) throw new Error(syntheseData.error);

    setStep(4);
    const pdfRes = await fetch('/api/pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        adresse: analyse.adresse,
        stats: analyse.stats,
        transactions: analyse.transactions,
        synthese: syntheseData.synthese,
        agence: { nom: agence }
      })
    });

    if (!pdfRes.ok) throw new Error('Erreur génération PDF');

    const blob = await pdfRes.blob();
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'dossier-mandat.pdf';
    a.click();

    setStep(5);
    status.className = 'status success';
    status.innerHTML = '✅ Dossier téléchargé avec succès.';

  } catch(err) {
    status.className = 'status error';
    status.innerHTML = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
</body>
</html>
